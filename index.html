<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bot Credits</title>
    
    <link rel="stylesheet" href="res/style.css">
    
</head>
<body>

    <div id="start-screen">
        <button id="start-btn">Initialize System</button>
        <p class="subtitle">Press to boot...</p>
    </div>

    <audio id="bgm" src="res/song/song.mp3"></audio>

    <div id="terminal-window" style="display: none;">
        <div class="terminal-titlebar">
            <div class="window-buttons">
                <span class="btn close"></span>
                <span class="btn minimize"></span>
                <span class="btn maximize"></span>
            </div>
            <div class="window-title">bash - user#1637@discord-bot:~</div>
        </div>
        
        <div id="terminal">
            <div id="output"></div>
        </div>
    </div>

    <script src="res/credits.js"></script>
    
</body>
</html>
